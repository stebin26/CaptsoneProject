services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ops_postgres
    environment:
      POSTGRES_DB: ${OPS_POSTGRES_DB:-ops}
      POSTGRES_USER: ${OPS_POSTGRES_USER:-ops}
      POSTGRES_PASSWORD: ${OPS_POSTGRES_PASSWORD:-ops}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${OPS_POSTGRES_USER:-ops} -d ${OPS_POSTGRES_DB:-ops}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ops_net

  seed:
    build:
      context: .
      dockerfile: services/data-simulator/Dockerfile
    container_name: ops_seed
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      OPS_ENVIRONMENT: ${OPS_ENVIRONMENT:-development}
      OPS_POSTGRES_HOST: postgres
      OPS_POSTGRES_PORT: 5432
      OPS_POSTGRES_DB: ${OPS_POSTGRES_DB:-ops}
      OPS_POSTGRES_USER: ${OPS_POSTGRES_USER:-ops}
      OPS_POSTGRES_PASSWORD: ${OPS_POSTGRES_PASSWORD:-ops}
    command: ["python", "-m", "app.cli", "seed"]
    volumes:
      - shared_data:/data
    networks:
      - ops_net
    restart: "no"

  api:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: ops_api
    depends_on:
      postgres:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    environment:
      OPS_ENVIRONMENT: ${OPS_ENVIRONMENT:-development}
      OPS_POSTGRES_HOST: postgres
      OPS_POSTGRES_PORT: 5432
      OPS_POSTGRES_DB: ${OPS_POSTGRES_DB:-ops}
      OPS_POSTGRES_USER: ${OPS_POSTGRES_USER:-ops}
      OPS_POSTGRES_PASSWORD: ${OPS_POSTGRES_PASSWORD:-ops}
      OPS_DUCKDB_PATH: /data/analytics.duckdb
      OPS_UPLOAD_DIR: /data/uploads
      OPS_API_CORS_ORIGINS: '["http://localhost:8050"]'
      OPS_ANTHROPIC_API_KEY: ${OPS_ANTHROPIC_API_KEY:-}
      OPS_LLM_ENABLED: ${OPS_LLM_ENABLED:-true}
      OPS_LLM_MODEL: ${OPS_LLM_MODEL:-claude-sonnet-4-6}
      # llm.py prefixes every key with OPS_ (see _env()), so these MUST carry it.
      OPS_OLLAMA_HOST: ${OPS_OLLAMA_HOST:-http://host.docker.internal:11434}
      # 3b is the working default: 8b reasons better but does not finish inside
      # any usable timeout on CPU. Override in .env if a GPU is available.
      OPS_AGENT_MODEL: ${OPS_AGENT_MODEL:-llama3.2:3b}
      OPS_AGENT_TEMPERATURE: ${OPS_AGENT_TEMPERATURE:-0.1}
      OPS_AGENT_NUM_CTX: ${OPS_AGENT_NUM_CTX:-4096}
      OPS_AGENT_LLM_TIMEOUT: ${OPS_AGENT_LLM_TIMEOUT:-180}
      OPS_AGENT_LLM_RETRIES: ${OPS_AGENT_LLM_RETRIES:-3}
    ports:
      - "8000:8000"
    volumes:
      - shared_data:/data
      # Alembic (Item 7): host-mounted during development so migrations can be
      # edited without an image rebuild. Final image bakes these in via COPY.
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    networks:
      - ops_net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 150s
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: services/dashboard/Dockerfile
    container_name: ops_dashboard
    depends_on:
      api:
        condition: service_healthy
    environment:
      OPS_ENVIRONMENT: ${OPS_ENVIRONMENT:-development}
      OPS_API_BASE_URL: http://api:8000/api/v1
      OPS_DASH_HOST: 0.0.0.0
      OPS_DASH_PORT: 8050
    ports:
      - "8050:8050"
    networks:
      - ops_net
    restart: unless-stopped

  airflow-postgres:
    image: postgres:16-alpine
    container_name: ops_airflow_postgres
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    volumes:
      - airflow_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ops_net

  airflow-redis:
    image: redis:7-alpine
    container_name: ops_airflow_redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ops_net

  airflow-init:
    image: ops-airflow:local
    build:
      context: .
      dockerfile: services/orchestration/Dockerfile
    container_name: ops_airflow_init
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-redis:
        condition: service_healthy
    environment: &airflow_common_env
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-apiserver:8080/execution/
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CELERY__BROKER_URL: redis://airflow-redis:6379/0
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__API__SECRET_KEY: ${AIRFLOW_API_SECRET_KEY:-}
      AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_JWT_SECRET:-}
      OPS_ENVIRONMENT: ${OPS_ENVIRONMENT:-development}
      OPS_POSTGRES_HOST: postgres
      OPS_POSTGRES_PORT: 5432
      OPS_POSTGRES_DB: ${OPS_POSTGRES_DB:-ops}
      OPS_POSTGRES_USER: ${OPS_POSTGRES_USER:-ops}
      OPS_POSTGRES_PASSWORD: ${OPS_POSTGRES_PASSWORD:-ops}
      OPS_DUCKDB_PATH: /data/analytics.duckdb
      OPS_UPLOAD_DIR: /data/uploads
      OPS_ANTHROPIC_API_KEY: ${OPS_ANTHROPIC_API_KEY:-}
      OPS_LLM_ENABLED: ${OPS_LLM_ENABLED:-true}
      OPS_LLM_MODEL: ${OPS_LLM_MODEL:-claude-sonnet-4-6}
    volumes: &airflow_common_volumes
      - ./services/orchestration/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - shared_data:/data
      - ./services/analytics-spark/jobs:/opt/spark/jobs
      - ./services/orchestration/jars/postgresql-42.7.4.jar:/opt/spark/jars/postgresql-42.7.4.jar
      - ./services/ml/jobs:/opt/ml/jobs 
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname admin \
          --lastname admin \
          --role Admin \
          --email admin@example.com || true
    networks:
      - ops_net
    restart: "no"

  airflow-apiserver:
    image: ops-airflow:local
    container_name: ops_airflow_apiserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow_common_env
    volumes: *airflow_common_volumes
    command: ["api-server"]
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/api/v2/version')\""]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - ops_net
    restart: unless-stopped

  airflow-scheduler:
    image: ops-airflow:local
    container_name: ops_airflow_scheduler
    depends_on:
      airflow-apiserver:
        condition: service_healthy
    environment: *airflow_common_env
    volumes: *airflow_common_volumes
    command: ["scheduler"]
    networks:
      - ops_net
    restart: unless-stopped

  airflow-dag-processor:
    image: ops-airflow:local
    container_name: ops_airflow_dag_processor
    depends_on:
      airflow-apiserver:
        condition: service_healthy
    environment: *airflow_common_env
    volumes: *airflow_common_volumes
    command: ["dag-processor"]
    networks:
      - ops_net
    restart: unless-stopped

  airflow-worker:
    image: ops-airflow:local
    container_name: ops_airflow_worker
    depends_on:
      airflow-apiserver:
        condition: service_healthy
    environment: *airflow_common_env
    volumes: *airflow_common_volumes
    command: ["celery", "worker"]
    networks:
      - ops_net
    restart: unless-stopped

  airflow-triggerer:
    image: ops-airflow:local
    container_name: ops_airflow_triggerer
    depends_on:
      airflow-apiserver:
        condition: service_healthy
    environment: *airflow_common_env
    volumes: *airflow_common_volumes
    command: ["triggerer"]
    networks:
      - ops_net
    restart: unless-stopped

  spark-master:
    build:
      context: .
      dockerfile: services/analytics-spark/Dockerfile
    container_name: ops_spark_master
    environment:
      SPARK_MODE: master
      SPARK_MASTER_HOST: spark-master
      SPARK_NO_DAEMONIZE: "true"
      SPARK_MASTER_OPTS: "-Dspark.master.rest.enabled=true"
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    volumes:
      - ./services/analytics-spark/jobs:/opt/spark/jobs
    ports:
      - "8081:8080"
      - "7077:7077"
      - "6066:6066"
    networks:
      - ops_net
    restart: unless-stopped

  spark-worker:
    build:
      context: .
      dockerfile: services/analytics-spark/Dockerfile
    container_name: ops_spark_worker
    depends_on:
      - spark-master
    environment:
      SPARK_MODE: worker
      SPARK_NO_DAEMONIZE: "true"
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
    volumes:
      - ./services/analytics-spark/jobs:/opt/spark/jobs
    networks:
      - ops_net
    restart: unless-stopped

volumes:
  pg_data:
  shared_data:
  airflow_pg_data:
  airflow_logs:

networks:
  ops_net:
    driver: bridge