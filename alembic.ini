# Alembic configuration — Industrial Operations Intelligence Platform.
# DB URL is NOT set here; env.py pulls it from ops_common at runtime,
# so there is one source of truth and no password duplicated in a file.

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
version_path_separator = os

# sqlalchemy.url intentionally left blank — set in env.py from ops_common.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S