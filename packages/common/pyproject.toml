[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ops-common"
version = "0.1.0"
description = "Shared config, database, logging, and universal domain model for the Operations Intelligence Platform."
readme = "README.md"
requires-python = ">=3.11"
authors = [{ name = "Suru" }]

dependencies = [
    "pydantic>=2.6,<3.0",
    "pydantic-settings>=2.2,<3.0",
    "sqlalchemy>=2.0,<2.1",
    "psycopg[binary]>=3.1,<4.0",
    "duckdb>=0.10,<2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=4.1",
    "ruff>=0.3",
    "mypy>=1.9",
]

[tool.setuptools]
packages = ["ops_common", "ops_common.domain"]

[tool.setuptools.package-data]
ops_common = ["py.typed"]

[tool.ruff]
extend = "../../pyproject.toml"
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "N"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.12"
warn_unused_ignores = true
ignore_missing_imports = true
plugins = ["pydantic.mypy"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]